name: deploy

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "Dockerfile"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: p-14139-2-test
  REGISTRY: ghcr.io

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:

  release:
    name: Create Tag & Release
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  docker:
    name: Build & Push Docker Image
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: application-secret.yml 생성
        run: |
          cat <<'EOF' > src/main/resources/application-secret.yml
          ${{ secrets.APPLICATION_SECRET_YML }}
          EOF

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release.outputs.tag }}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max,compression=zstd
  deploy:
    runs-on: ubuntu-latest
    needs: [ docker ]
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest
        run: |
          SCRIPT=$(cat <<DEPLOY
          docker pull $IMAGE
          docker stop app1 2>/dev/null || true
          docker rm app1 2>/dev/null || true
          docker run -d --name app1 -p 8080:8080 $IMAGE
          docker rmi \$(docker images -f dangling=true -q) 2>/dev/null || true
          DEPLOY
          )

          INSTANCE_ID="i-09a98c9b42ca881db"
          PARAMS=$(jq -n --arg cmd "$SCRIPT" '{"commands":[$cmd]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # 명령 완료 대기
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          # 결과 출력
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID")

          STATUS=$(echo "$OUTPUT" | jq -r '.Status')
          echo "Status: $STATUS"
          echo "--- stdout ---"
          echo "$OUTPUT" | jq -r '.StandardOutputContent'
          echo "--- stderr ---"
          echo "$OUTPUT" | jq -r '.StandardErrorContent'

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi